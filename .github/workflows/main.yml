name: Build qpdf

permissions:
  contents: read

on:
  workflow_dispatch:

env:
  QPDF_BRANCH: "12.3"

jobs:
  main:
    name: ${{ matrix.runtime.name }}
    runs-on: ${{ matrix.runtime.runs-on }}
    container: ${{ matrix.runtime.container }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        runtime:
        - name: win-x64
          runs-on: windows-latest
        - name: win-x86
          runs-on: windows-latest
        - name: win-arm64
          runs-on: windows-11-arm
        - name: linux-x64
          runs-on: ubuntu-latest
          container: quay.io/pypa/manylinux_2_28_x86_64
        - name: linux-arm64
          runs-on: ubuntu-24.04-arm
          container: quay.io/pypa/manylinux_2_28_aarch64
        - name: linux-musl-x64
          runs-on: ubuntu-latest
          container: alpine:3.17
        - name: osx-x64
          runs-on: macos-26-intel
        - name: osx-arm64
          runs-on: macos-latest

    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"
      QPDF_CXX_FLAGS: "-Os -ffunction-sections -fdata-sections -fvisibility=hidden -fvisibility-inlines-hidden"

    steps:
      - uses: actions/checkout@v4


      - name: Install Dependencies (Linux)
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          # manylinux_2_28 ships gcc-toolset, cmake, git, wget, and make preinstalled.
          # dnf is idempotent, so installing them again is a no-op safety net.
          # libicu is added because the .NET 8 runtime depends on it for globalization.
          dnf install -y git wget make pkgconfig zlib-devel libicu


      - name: Install Dependencies (Linux MUSL)
        if: matrix.runtime.name == 'linux-musl-x64'
        run: |
          apk update
          apk upgrade
          apk add bash wget curl git build-base cmake pkgconf g++ sudo icu-libs zlib zlib-dev
          adduser $(whoami) wheel


      - name: Download QPDF
        shell: bash
        run: |
          git clone --branch "$QPDF_BRANCH" --single-branch https://github.com/QuestPDF/QuestPDF.Native.Qpdf qpdf
          cd qpdf
          mkdir build


      - name: Install MSYS2 (Windows x64)
        if: matrix.runtime.name == 'win-x64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-zlib
            make


      - name: Pin MSYS2 CRT (Windows x86)
        if: matrix.runtime.name == 'win-x86'
        shell: msys2 {0}
        run: |
          set -euxo pipefail

          # Temporary workaround for the MinGW32 CRT regression introduced after 2026-06-10.
          # The newer i686 CRT pulls i386__beginthreadex.o from libmsvcrt.a, which currently
          # fails to resolve __mingw_SEH_error_handler when building qpdf.dll with -static.
          pacman --noconfirm -U \
            https://repo.msys2.org/mingw/mingw32/mingw-w64-i686-headers-14.0.0.r92.g818fa6510-1-any.pkg.tar.zst \
            https://repo.msys2.org/mingw/mingw32/mingw-w64-i686-crt-14.0.0.r92.g818fa6510-1-any.pkg.tar.zst

          pacman -Q \
            mingw-w64-i686-gcc \
            mingw-w64-i686-binutils \
            mingw-w64-i686-headers \
            mingw-w64-i686-crt


      - name: Install MSYS2 (Windows arm64)
        if: matrix.runtime.name == 'win-arm64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >
            mingw-w64-clang-aarch64-toolchain
            mingw-w64-clang-aarch64-cmake
            mingw-w64-clang-aarch64-pkgconf
            mingw-w64-clang-aarch64-zlib
            make


      - name: Build QPDF (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: msys2 {0}
        run: |
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_CXX_FLAGS="$QPDF_CXX_FLAGS" -DCMAKE_SHARED_LINKER_FLAGS="-static -Wl,--gc-sections -s"
          cmake --build build --parallel --target libqpdf


      - name: Build QPDF Linux (manylinux)
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          # Activate the modern GCC toolset that ships with manylinux_2_28.
          # The glob avoids hardcoding the gcc-toolset version (currently 14).
          # Each `run:` block gets a fresh shell, so we re-source it here.
          source /opt/rh/gcc-toolset-*/enable
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_CXX_FLAGS="$QPDF_CXX_FLAGS" -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--gc-sections -Wl,--exclude-libs,ALL -s"
          cmake --build build --parallel --target libqpdf


      - name: Build QPDF Linux (musl)
        if: matrix.runtime.name == 'linux-musl-x64'
        shell: bash
        run: |
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_INCLUDE_PATH=/usr/local/include -DCMAKE_LIBRARY_PATH=/usr/local/lib64 -DCMAKE_CXX_FLAGS="$QPDF_CXX_FLAGS" -DCMAKE_SHARED_LINKER_FLAGS="-Wl,--gc-sections -Wl,--exclude-libs,ALL -s"
          cmake --build build --parallel --target libqpdf


      - name: Build QPDF OSX
        if: startsWith(matrix.runtime.name, 'osx-')
        shell: bash
        run: |
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_CXX_FLAGS="$QPDF_CXX_FLAGS" -DCMAKE_SHARED_LINKER_FLAGS="-Wl,-dead_strip"
          cmake --build build --parallel --target libqpdf


      - name: Create output folder
        shell: bash
        run: mkdir -p output/runtimes/${{ matrix.runtime.name }}/native


      - name: Copy build artifact (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: bash
        run: cp qpdf/build/libqpdf/qpdf*.dll output/runtimes/${{ matrix.runtime.name }}/native/qpdf.dll


      - name: Copy build artifact (Linux)
        if: startsWith(matrix.runtime.name, 'linux-')
        shell: bash
        run: cp -L qpdf/build/libqpdf/libqpdf.so output/runtimes/${{ matrix.runtime.name }}/native/libqpdf.so


      - name: Copy build artifact (OSX)
        if: startsWith(matrix.runtime.name, 'osx-')
        shell: bash
        run: cp -L qpdf/build/libqpdf/libqpdf.dylib output/runtimes/${{ matrix.runtime.name }}/native/libqpdf.dylib


      - name: Strip symbols (OSX)
        if: startsWith(matrix.runtime.name, 'osx-')
        shell: bash
        run: strip -x output/runtimes/${{ matrix.runtime.name }}/native/libqpdf.dylib


      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-native-libraries-${{ matrix.runtime.name }}
          path: output


      - name: Setup .NET 8.0 SDK (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: pwsh
        run: |
          $arch = "${{ matrix.runtime.name }}".Replace("win-", "")

          $script = "$env:RUNNER_TEMP\dotnet-install.ps1"
          $installDir = "$env:RUNNER_TEMP\dotnet-$arch"

          Invoke-WebRequest -Uri https://dot.net/v1/dotnet-install.ps1 -OutFile $script
          & $script -Channel 8.0 -Architecture $arch -InstallDir $installDir

          Add-Content -Path $env:GITHUB_PATH -Value $installDir
          Add-Content -Path $env:GITHUB_ENV -Value "DOTNET_ROOT=$installDir"


      - name: Setup .NET 8.0 SDK (Unix)
        if: startsWith(matrix.runtime.name, 'win-') == false
        shell: bash
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
          INSTALL_DIR="$HOME/.dotnet"
          bash /tmp/dotnet-install.sh --channel 8.0 --install-dir "$INSTALL_DIR"
          echo "$INSTALL_DIR" >> $GITHUB_PATH
          echo "DOTNET_ROOT=$INSTALL_DIR" >> $GITHUB_ENV


      - name: Test build artifacts
        shell: bash
        run: |
          TEST_EXECUTION_PATH='integration-test/bin/Debug/net8.0/${{ matrix.runtime.name }}'
          mkdir -p "$TEST_EXECUTION_PATH"

          cp -R output/runtimes/${{ matrix.runtime.name }}/native/* "$TEST_EXECUTION_PATH"

          cd integration-test
          dotnet build --framework net8.0 --runtime ${{ matrix.runtime.name }} --no-self-contained
          dotnet run --framework net8.0 --runtime ${{ matrix.runtime.name }} --no-self-contained
          cd ../

          mkdir -p testOutput/${{ matrix.runtime.name }}
          cp $TEST_EXECUTION_PATH/output_page_selection.pdf testOutput/${{ matrix.runtime.name }}
          cp $TEST_EXECUTION_PATH/output_password.pdf testOutput/${{ matrix.runtime.name }}
          cp $TEST_EXECUTION_PATH/output_attachment.pdf testOutput/${{ matrix.runtime.name }}


      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-test-results-${{ matrix.runtime.name }}
          path: testOutput


  merge:
    runs-on: ubuntu-latest
    needs: main
    steps:
      - name: Merge native libraries
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-native-libraries
          pattern: questpdf-native-libraries-*
          delete-merged: true


      - name: Merge test results
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-test-results
          pattern: questpdf-test-results-*
          delete-merged: true
