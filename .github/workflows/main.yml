name: Build qpdf

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  main:
    name: ${{ matrix.runtime.name }}
    runs-on: ${{ matrix.runtime.runs-on }}
    container: ${{ matrix.runtime.container }}
    timeout-minutes: 30
    
    strategy:
      fail-fast: false
      matrix:
        runtime: 
        - name: win-x64
          runs-on: windows-latest-xlarge
        - name: win-x86
          runs-on: windows-latest-xlarge
        - name: linux-x64
          runs-on: ubuntu-latest-xlarge
          container: ubuntu:19.04
        - name: linux-arm64
          runs-on: ubuntu-latest-xlarge-arm64
          container: ubuntu:19.04
        - name: linux-musl-x64
          runs-on: ubuntu-latest-xlarge
          container: alpine:3.17
        - name: osx-x64
          runs-on: macos-latest-large
        - name: osx-arm64
          runs-on: macos-latest-xlarge
        
    env:
      DEBIAN_FRONTEND: noninteractive
      
    steps:
      - uses: actions/checkout@v4


      - name: Install Dependencies (Linux)
        if: matrix.runtime.name == 'linux-x64'
        shell: bash
        run: |
          cat > /etc/apt/sources.list << EOF
          deb http://archive.ubuntu.com/ubuntu/ focal main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu/ focal-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu/ focal-backports main restricted universe multiverse
          deb http://security.ubuntu.com/ubuntu focal-security main restricted universe multiverse
          EOF


      - name: Install Dependencies (Linux ARM)
        if: matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          cat > /etc/apt/sources.list << EOF
          deb http://ports.ubuntu.com/ubuntu-ports/ focal main restricted universe multiverse
          deb http://ports.ubuntu.com/ubuntu-ports/ focal-updates main restricted universe multiverse
          deb http://ports.ubuntu.com/ubuntu-ports/ focal-backports main restricted universe multiverse
          deb http://ports.ubuntu.com/ubuntu-ports/ focal-security main restricted universe multiverse
          EOF


      - name: Install Dependencies (Linux)
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          apt update --yes
          apt upgrade --yes
          apt install wget git make gcc g++ build-essential pkg-config zlib1g zlib1g-dev sudo --yes
          usermod -aG sudo $(whoami)

          
      - name: Install Dependencies (Linux MUSL)
        if: matrix.runtime.name == 'linux-musl-x64'
        run: |
          apk update
          apk upgrade
          apk add bash wget git build-base cmake pkgconf g++ sudo icu-libs zlib zlib-dev
          adduser $(whoami) wheel


      - name: Download and install cmake (Linux)
        if: matrix.runtime.name == 'linux-x64' || matrix.runtime.name == 'linux-arm64'
        shell: bash
        run: |
          wget https://github.com/Kitware/CMake/releases/download/v3.29.9/cmake-3.29.9.tar.gz
          tar -zxvf cmake-3.29.9.tar.gz
          cd cmake-3.29.9
          ./bootstrap -- -DCMAKE_USE_OPENSSL=OFF
          make -j$(nproc)
          sudo make install
          sudo ln -s /usr/local/bin/cmake /usr/bin/cmake

          
      - name: Download QPDF
        shell: bash
        run: |
          git clone --branch 12.3 --single-branch https://github.com/QuestPDF/QuestPDF.Native.Qpdf qpdf
          cd qpdf
          mkdir build


      - name: Install MSYS2 (Windows x64)
        if: matrix.runtime.name == 'win-x64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-zlib
            make


      - name: Install MSYS2 (Windows x86)
        if: matrix.runtime.name == 'win-x86'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >
            mingw-w64-i686-toolchain
            mingw-w64-i686-cmake
            mingw-w64-i686-gcc
            mingw-w64-i686-pkgconf
            mingw-w64-i686-zlib
            make


      - name: Build QPDF (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: msys2 {0}
        run: |
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON  -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_CXX_FLAGS="-Os -s"
          cmake --build build --parallel --target libqpdf
          

      - name: Build QPDF Linux
        if: startsWith(matrix.runtime.name, 'linux-')
        shell: bash
        run: |
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_INCLUDE_PATH=/usr/local/include -DCMAKE_LIBRARY_PATH=/usr/local/lib64 -DCMAKE_CXX_FLAGS="-Os -s"
          cmake --build build --parallel --target libqpdf


      - name: Build QPDF OSX
        if: startsWith(matrix.runtime.name, 'osx-')
        shell: bash
        run: |
          cd qpdf
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_STATIC_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON  -DUSE_IMPLICIT_CRYPTO=OFF -DREQUIRE_CRYPTO_NATIVE=ON -DCMAKE_CXX_FLAGS="-Os -s"
          cmake --build build --parallel --target libqpdf


      - name: Create output folder
        shell: bash
        run: mkdir -p output/runtimes/${{ matrix.runtime.name }}/native

        
      - name: Copy build artifact (Windows)
        if: startsWith(matrix.runtime.name, 'win-')
        shell: bash
        run: cp qpdf/build/libqpdf/qpdf30.dll output/runtimes/${{ matrix.runtime.name }}/native/qpdf.dll


      - name: Copy build artifact (Linux)
        if: startsWith(matrix.runtime.name, 'linux-')
        shell: bash
        run: cp qpdf/build/libqpdf/libqpdf.so.30.3.2 output/runtimes/${{ matrix.runtime.name }}/native/libqpdf.so


      - name: Copy build artifact (OSX)
        if: startsWith(matrix.runtime.name, 'osx-')
        shell: bash
        run: cp qpdf/build/libqpdf/libqpdf.30.3.2.dylib output/runtimes/${{ matrix.runtime.name }}/native/libqpdf.dylib


      - name: Copy C++ runtime dependencies (Windows x64)
        if: matrix.runtime.name == 'win-x64'
        shell: msys2 {0}
        run: |
          cp /mingw64/bin/libgcc_s_seh-1.dll \
             /mingw64/bin/libstdc++-6.dll \
             /mingw64/bin/libwinpthread-1.dll \
             /mingw64/bin/zlib1.dll \
             output/runtimes/${{ matrix.runtime.name }}/native/

      
      - name: Copy C++ runtime dependencies (Windows x86)
        if: matrix.runtime.name == 'win-x86'
        shell: msys2 {0}
        run: |
          cp /mingw32/bin/libgcc_s_dw2-1.dll \
             /mingw32/bin/libstdc++-6.dll \
             /mingw32/bin/libwinpthread-1.dll \
             /mingw32/bin/zlib1.dll \
             output/runtimes/${{ matrix.runtime.name }}/native/


      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-native-libraries-${{ matrix.runtime.name }}
          path: output


      - name: Setup .NET 8.0 SDK
        if: matrix.runtime.name != 'win-x86'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'


      - name: Install .NET 8 SDK (x86) and pin env (win-x86 only)
        if: matrix.runtime.name == 'win-x86'
        shell: powershell
        run: |
          $InstallDir = "$env:RUNNER_TEMP\dotnet-x86"
          iwr https://dot.net/v1/dotnet-install.ps1 -OutFile $env:RUNNER_TEMP\dotnet-install.ps1
          & $env:RUNNER_TEMP\dotnet-install.ps1 -Channel 8.0 -Architecture x86 -InstallDir $InstallDir

          
      - name: Test build artifacts
        shell: bash
        run: |
          TEST_EXECUTION_PATH='test/bin/Debug/net8.0/${{ matrix.runtime.name }}'
          mkdir -p "$TEST_EXECUTION_PATH"
          
          # This now copies qpdf.dll AND all its dependencies into the test folder
          cp -R output/runtimes/${{ matrix.runtime.name }}/native/* "$TEST_EXECUTION_PATH"

          cd test
          dotnet build --framework net8.0 --runtime ${{ matrix.runtime.name }} --no-self-contained
          dotnet run --framework net8.0 --runtime ${{ matrix.runtime.name }} --no-self-contained
          cd ../
          
          mkdir -p testOutput/${{ matrix.runtime.name }}
          cp $TEST_EXECUTION_PATH/output_page_selection.pdf testOutput/${{ matrix.runtime.name }}
          cp $TEST_EXECUTION_PATH/output_password.pdf testOutput/${{ matrix.runtime.name }}
          cp $TEST_EXECUTION_PATH/output_attachment.pdf testOutput/${{ matrix.runtime.name }}

          
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: questpdf-test-results-${{ matrix.runtime.name }}
          path: testOutput

          
  merge:
    runs-on: ubuntu-latest
    needs: main
    steps:
      - name: Merge native libraries
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-native-libraries
          pattern: questpdf-native-libraries-*
          delete-merged: true


      - name: Merge test results
        uses: actions/upload-artifact/merge@v4
        with:
          name: questpdf-test-results
          pattern: questpdf-test-results-*
          delete-merged: true
